# Codeos reviewer configuration
# Written by dba-init.sh to .codeos/reviewer.toml in the downstream project.
# Override individual fields; omit to use defaults.
#
# Config precedence (highest to lowest):
#   1. --provider CLI flag
#   2. CODEOS_REVIEWER_PROVIDER env var
#   3. This file (.codeos/reviewer.toml or reviewer.toml at repo root)
#   4. Built-in default (codex)

# Reviewer provider. Supported values: codex | open-code | gemini | kimi
# Other values are rejected at startup (fail-closed).
provider = "codex"

# Reasoning effort passed to the provider. Provider-specific semantics.
# codex: "high" | "medium" | "low" (default: "high")
reasoning_effort = "high"
